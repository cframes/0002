<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#000000" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>Professional Stable AR</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html,body{
  width:100%;height:100%;
  overflow:hidden;
  background:#000;
  font-family:Arial,sans-serif;
  touch-action:none;
  -webkit-user-select:none;user-select:none;
}

body{position:fixed;inset:0;}
canvas{display:block;image-rendering:auto;}

#loading{
  position:fixed;inset:0;
  background:#000;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;gap:16px;
  z-index:9999;
  color:#fff;font-size:18px;letter-spacing:.5px;
  transition:opacity .4s ease;
}
#loading.hide{opacity:0;pointer-events:none;}

#loading-spinner{
  width:36px;height:36px;
  border:3px solid rgba(255,255,255,.2);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

#error{
  position:fixed;inset:0;
  background:#000;
  display:none;flex-direction:column;
  justify-content:center;align-items:center;gap:12px;
  z-index:9999;
  color:#ff5555;font-size:16px;
  text-align:center;padding:24px;
}
#error.show{display:flex;}
</style>
</head>

<body>

<div id="loading">
  <div id="loading-spinner"></div>
  <span>Loading AR…</span>
</div>

<div id="error">
  <span>⚠️ Could not load AR target.<br>Please check your connection and refresh.</span>
</div>

<a-scene
  embedded
  vr-mode-ui="enabled:false"
  device-orientation-permission-ui="enabled:false"
  color-space="sRGB"
  renderer="
    alpha:true;
    antialias:false;
    precision:mediump;
    colorManagement:true;
    sortObjects:true;
    physicallyCorrectLights:false;
    logarithmicDepthBuffer:false;
    powerPreference:high-performance;
    maxCanvasWidth:1920;
    maxCanvasHeight:1920;
  "
  mindar-image="
    imageTargetSrc: targets.mind;
    autoStart: true;
    uiLoading: no;
    uiScanning: yes;
    uiError: no;
    maxTrack: 1;
    filterMinCF: 0.1;
    filterBeta: 0.001;
    warmupTolerance: 5;
    missTolerance: 10;
  "
>

  <a-assets timeout="30000" id="assets">
    <video
      id="video"
      src="video.mp4"
      preload="auto"
      crossorigin="anonymous"
      loop
      playsinline
      webkit-playsinline
      muted
    ></video>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled:false"></a-camera>

  <a-entity id="target" mindar-image-target="targetIndex:0">
    <a-video
      id="videoPlane"
      src="#video"
      position="0 0 0"
      width="1"
      height="1.5"
      material="
        shader:flat;
        transparent:true;
        depthTest:false;
        depthWrite:false;
        toneMapped:false;
        npot:true;
      "
    ></a-video>
  </a-entity>

</a-scene>

<script>
(function () {

  /* ── Element refs ────────────────────────────────── */
  const scene      = document.querySelector("a-scene");
  const video      = document.querySelector("#video");
  const assets     = document.querySelector("#assets");
  const target     = document.querySelector("#target");
  const videoPlane = document.querySelector("#videoPlane");
  const loading    = document.querySelector("#loading");
  const errorEl    = document.querySelector("#error");

  /* ── State ───────────────────────────────────────── */
  let tracking       = false;
  let audioReady     = false;
  let lostTimer      = null;
  let rafId          = null;
  let rafRunning     = false;
  let smoothingReady = false;

  /* ── Pre-allocated THREE objects (zero GC in loop) ──
     Never use "new" inside the RAF loop — every allocation
     triggers garbage collection which causes frame drops.   */
  const THREE    = AFRAME.THREE;

  // Raw pose from MindAR (target entity local space)
  const rawPos   = new THREE.Vector3();
  const rawQuat  = new THREE.Quaternion();
  const rawScale = new THREE.Vector3();

  // Smoothed pose we write to videoPlane
  const smPos    = new THREE.Vector3();
  const smQuat   = new THREE.Quaternion();

  // Smoothing factor: 0.18 = very smooth, 0.35 = more responsive.
  // 0.22 hits the sweet spot — kills jitter, follows fast movement well.
  const LERP = 0.22;

  /* ── iOS attribute fix ───────────────────────────── */
  video.setAttribute("playsinline", "");
  video.setAttribute("webkit-playsinline", "");

  /* ── Cap pixel ratio — no tracking benefit above 2x ─ */
  scene.addEventListener("loaded", () => {
    if (scene.renderer) {
      scene.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    }
  });

  /* ── Error handling ──────────────────────────────── */
  fetch("targets.mind", { method: "HEAD" }).catch(showError);
  scene.addEventListener("arError", showError);

  function showError() {
    loading.classList.add("hide");
    errorEl.classList.add("show");
  }

  /* ── Hide loading overlay ────────────────────────── */
  scene.addEventListener("renderstart", () => {
    setTimeout(() => loading.classList.add("hide"), 400);
  });

  /* ── Auto-fit video to natural aspect ratio ──────── */
  video.addEventListener("loadedmetadata", () => {
    const r = video.videoWidth / video.videoHeight;
    if (r > 1) {
      videoPlane.setAttribute("width",  r);
      videoPlane.setAttribute("height", 1);
    } else {
      videoPlane.setAttribute("width",  1);
      videoPlane.setAttribute("height", 1 / r);
    }
  });

  /* ── Buffer video once assets are ready ──────────── */
  assets.addEventListener("loaded", () => {
    video.muted = true;
    video.play()
      .then(() => { video.pause(); video.currentTime = 0; })
      .catch(() => {});
  });

  /* ── Audio unlock on first user gesture ─────────── */
  // One pointerdown anywhere silently primes the audio context.
  // After this, targetFound plays with sound on both Android & iOS.
  document.addEventListener("pointerdown", onFirstGesture, { once: true, passive: true });

  function onFirstGesture() {
    if (audioReady) return;
    const wasMuted = video.muted;
    video.muted = false;
    video.play()
      .then(() => {
        audioReady = true;
        if (!tracking) { video.pause(); video.currentTime = 0; }
      })
      .catch(() => { video.muted = wasMuted; });
  }

  /* ── Target found ────────────────────────────────── */
  target.addEventListener("targetFound", async () => {
    clearTimeout(lostTimer);
    lostTimer = null;
    if (tracking) return;
    tracking = true;

    // Reset smoothing — first frame will snap directly to pose
    smoothingReady = false;

    videoPlane.object3D.visible = true;
    startRaf();

    video.muted = !audioReady;
    try {
      if (video.readyState >= 2) video.currentTime = 0;
      await video.play();
      video.muted = false;
    } catch (e) {}
  });

  /* ── Target lost ─────────────────────────────────── */
  target.addEventListener("targetLost", () => {
    // 800 ms grace period — prevents flicker on brief occlusions
    lostTimer = setTimeout(() => {
      tracking = false;
      video.pause();
      videoPlane.object3D.visible = false;
      stopRaf();
    }, 800);
  });

  /* ── Page visibility ─────────────────────────────── */
  document.addEventListener("visibilitychange", () => {
    if (document.hidden) {
      video.pause();
    } else if (tracking) {
      video.play().catch(() => {});
    }
  });

  /* ── RAF loop ────────────────────────────────────── */
  function startRaf() {
    if (rafRunning) return;
    rafRunning = true;
    loop();
  }

  function stopRaf() {
    rafRunning = false;
    cancelAnimationFrame(rafId);
    rafId = null;
  }

  function loop() {
    if (!rafRunning) return;

    /* 1. Keep video texture in sync ─────────────────── */
    if (video.readyState >= 2) {
      const mesh = videoPlane.getObject3D("mesh");
      if (mesh?.material?.map) mesh.material.map.needsUpdate = true;
    }

    /* 2. Smooth pose — zero allocation ──────────────── */
    // MindAR updates target.object3D.position / quaternion each frame
    // in the entity's LOCAL space (it is a direct child of the scene).
    // We read that local pose and lerp our smoothed accumulators toward
    // it, then write the smoothed values to videoPlane's local space.
    // No matrix inversion, no "new" calls → no GC pressure.

    const tObj = target.object3D;
    rawPos.copy(tObj.position);
    rawQuat.copy(tObj.quaternion);
    // rawScale intentionally ignored — image tracking never changes scale

    if (!smoothingReady) {
      // Snap on first frame so there's no slide-in from origin
      smPos.copy(rawPos);
      smQuat.copy(rawQuat);
      smoothingReady = true;
    } else {
      smPos.lerp(rawPos, LERP);
      smQuat.slerp(rawQuat, LERP);
    }

    // Write smoothed transform to videoPlane local space.
    // videoPlane is a child of target, so its parent transform is
    // already the target's pose — we only need to zero it out and
    // let the smoothed values on the parent (applied below) do the work.
    // Actually: we smooth the TARGET object3D directly so MindAR's
    // raw writes go to tObj, and we override position/quaternion with
    // our smoothed values before Three.js renders the frame.
    tObj.position.copy(smPos);
    tObj.quaternion.copy(smQuat);
    tObj.matrixAutoUpdate = true; // let Three.js recompute matrix from pos/quat

    rafId = requestAnimationFrame(loop);
  }

  /* ── Hide video plane until first target found ────── */
  videoPlane.addEventListener("loaded", () => {
    videoPlane.object3D.visible = false;
  });

}());
</script>

</body>
</html>
