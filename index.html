<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Smooth MindAR Video</title>

    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
    </style>

    <script>
      AFRAME.registerComponent("smooth-follow", {
        schema: {
          target: { type: "selector" },
          positionLerp: { default: 0.14 },
          rotationLerp: { default: 0.14 },
          scaleLerp: { default: 0.14 },
          hideDelay: { default: 300 }
        },

        init: function () {
          this.visibleTarget = false;
          this.ready = false;
          this.hideTimer = null;

          this.pos = new THREE.Vector3();
          this.quat = new THREE.Quaternion();
          this.scale = new THREE.Vector3();

          this.el.object3D.visible = false;

          this.onFound = () => {
            this.visibleTarget = true;
            clearTimeout(this.hideTimer);
          };

          this.onLost = () => {
            this.visibleTarget = false;

            clearTimeout(this.hideTimer);
            this.hideTimer = setTimeout(() => {
              if (!this.visibleTarget) {
                this.el.object3D.visible = false;
                this.ready = false;
              }
            }, this.data.hideDelay);
          };

          this.data.target.addEventListener("targetFound", this.onFound);
          this.data.target.addEventListener("targetLost", this.onLost);
        },

        tick: function () {
          if (!this.visibleTarget || !this.data.target) return;

          const targetObj = this.data.target.object3D;
          const obj = this.el.object3D;

          targetObj.updateMatrixWorld(true);
          targetObj.matrixWorld.decompose(this.pos, this.quat, this.scale);

          if (!this.ready) {
            obj.position.copy(this.pos);
            obj.quaternion.copy(this.quat);
            obj.scale.copy(this.scale);
            obj.visible = true;
            this.ready = true;
            return;
          }

          obj.position.lerp(this.pos, this.data.positionLerp);
          obj.quaternion.slerp(this.quat, this.data.rotationLerp);
          obj.scale.lerp(this.scale, this.data.scaleLerp);
        }
      });
    </script>
  </head>

  <body>
    <a-scene
      mindar-image="
        imageTargetSrc: ./targets.mind;
        filterMinCF: 0.0001;
        filterBeta: 0.001;
        warmupTolerance: 5;
        missTolerance: 5;
      "
      color-space="sRGB"
      renderer="colorManagement: true; physicallyCorrectLights: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <video
          id="vid"
          src="./video.mp4"
          loop
          playsinline
          webkit-playsinline
          crossorigin="anonymous"
          preload="auto"
        ></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target" mindar-image-target="targetIndex: 0"></a-entity>

      <a-entity
        id="smoothVideo"
        smooth-follow="target: #target; positionLerp: 0.14; rotationLerp: 0.14; scaleLerp: 0.14; hideDelay: 300"
      >
        <a-video
          id="videoPlane"
          src="#vid"
          width="1"
          height="1.5"
          position="0 0 0"
        ></a-video>
      </a-entity>
    </a-scene>

    <script>
      const video = document.querySelector("#vid");
      const videoPlane = document.querySelector("#videoPlane");
      const target = document.querySelector("#target");

      let unlocked = false;
      let targetVisible = false;
      let lostTimer = null;

      const frameWidth = 1;
      const frameHeight = 1.5;
      const fitMode = "cover";

      function fitVideoToFrame() {
        const videoRatio = video.videoWidth / video.videoHeight;
        const frameRatio = frameWidth / frameHeight;

        let width;
        let height;

        if (fitMode === "cover") {
          if (videoRatio > frameRatio) {
            height = frameHeight;
            width = frameHeight * videoRatio;
          } else {
            width = frameWidth;
            height = frameWidth / videoRatio;
          }
        } else {
          if (videoRatio > frameRatio) {
            width = frameWidth;
            height = frameWidth / videoRatio;
          } else {
            height = frameHeight;
            width = frameHeight * videoRatio;
          }
        }

        videoPlane.setAttribute("width", width);
        videoPlane.setAttribute("height", height);
      }

      async function unlockVideo() {
        if (unlocked) return;

        try {
          video.muted = false;
          video.volume = 1;

          await video.play();
          video.pause();
          video.currentTime = 0;

          unlocked = true;

          if (targetVisible) {
            video.play();
          }
        } catch (error) {
          console.error("Video/audio unlock failed:", error);
        }
      }

      video.addEventListener("loadedmetadata", fitVideoToFrame);

      document.body.addEventListener("click", unlockVideo, { once: true });
      document.body.addEventListener("touchstart", unlockVideo, { once: true });

      target.addEventListener("targetFound", () => {
        targetVisible = true;
        clearTimeout(lostTimer);

        if (unlocked) {
          video.muted = false;
          video.volume = 1;
          video.play();
        }
      });

      target.addEventListener("targetLost", () => {
        targetVisible = false;

        lostTimer = setTimeout(() => {
          video.pause();
        }, 300);
      });
    </script>
  </body>
</html>
