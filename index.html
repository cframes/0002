<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#000000" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>AR</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:100%;height:100%;
  overflow:hidden;
  background:#000;
  touch-action:none;
  -webkit-user-select:none;user-select:none;
  position:fixed;inset:0;
}
canvas{display:block;}
</style>
</head>

<body>

<a-scene
  embedded
  vr-mode-ui="enabled:false"
  device-orientation-permission-ui="enabled:false"
  color-space="sRGB"
  renderer="
    alpha:true;
    antialias:true;
    precision:mediump;
    colorManagement:true;
    sortObjects:true;
    physicallyCorrectLights:false;
    logarithmicDepthBuffer:true;
    powerPreference:high-performance;
  "
  mindar-image="
    imageTargetSrc: targets.mind;
    autoStart: true;
    uiLoading: no;
    uiScanning: no;
    uiError: no;
    maxTrack: 1;
    filterMinCF: 0.0001;
    filterBeta: 0.001;
    warmupTolerance: 10;
    missTolerance: 10;
  "
>

  <a-assets timeout="60000" id="assets">
    <video
      id="video"
      src="video.mp4"
      preload="auto"
      crossorigin="anonymous"
      loop
      playsinline
      webkit-playsinline
      muted
    ></video>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled:false"></a-camera>

  <a-entity id="target" mindar-image-target="targetIndex:0">
    <a-video
      id="videoPlane"
      src="#video"
      position="0 0 0"
      width="1"
      height="1.777"
      material="
        shader:flat;
        transparent:true;
        depthTest:false;
        depthWrite:false;
        toneMapped:false;
      "
    ></a-video>
  </a-entity>

</a-scene>

<script>
(function(){

  const scene      = document.querySelector("a-scene");
  const video      = document.querySelector("#video");
  const assets     = document.querySelector("#assets");
  const target     = document.querySelector("#target");
  const videoPlane = document.querySelector("#videoPlane");

  let tracking      = false;
  let audioUnlocked = false;
  let lostTimer     = null;
  let rafId         = null;

  /* ── iOS attribute fix ── */
  video.setAttribute("playsinline", "");
  video.setAttribute("webkit-playsinline", "");

  /* ── Fit video plane to actual video dimensions ── */
  video.addEventListener("loadedmetadata", () => {
    const ratio = video.videoWidth / video.videoHeight;
    if (ratio >= 1) {
      videoPlane.setAttribute("width",  ratio.toFixed(4));
      videoPlane.setAttribute("height", "1");
    } else {
      videoPlane.setAttribute("width",  "1");
      videoPlane.setAttribute("height", (1 / ratio).toFixed(4));
    }
  });

  /* ── Pre-buffer video (muted) so first frame is ready ── */
  assets.addEventListener("loaded", () => {
    video.muted = true;
    video.load();
    const warmup = video.play();
    if (warmup) warmup.then(() => { video.pause(); video.currentTime = 0; }).catch(()=>{});
  });

  /* ── Continuous RAF texture pump — always on once scene starts ── */
  // Running the loop continuously (not just when tracking) eliminates
  // the "frozen first frame" artefact when re-acquiring the target.
  scene.addEventListener("renderstart", startRaf);

  function startRaf() {
    if (rafId) return;
    (function loop() {
      const mesh = videoPlane.getObject3D && videoPlane.getObject3D("mesh");
      if (mesh && mesh.material && mesh.material.map && video.readyState >= 2) {
        mesh.material.map.needsUpdate = true;
      }
      rafId = requestAnimationFrame(loop);
    })();
  }

  /* ── Audio unlock on first user gesture ── */
  document.body.addEventListener("pointerdown", unlockAudio, { once: true, passive: true });

  async function unlockAudio() {
    if (audioUnlocked) return;
    try {
      video.muted = false;
      await video.play();
      video.pause();
      video.currentTime = 0;
      audioUnlocked = true;
    } catch(e) {
      video.muted = true;
    }
  }

  /* ── Target found ── */
  target.addEventListener("targetFound", async () => {
    clearTimeout(lostTimer);
    lostTimer = null;

    videoPlane.object3D.visible = true;

    if (!tracking) {
      tracking = true;
      video.currentTime = 0;
    }

    try {
      video.muted = !audioUnlocked;
      await video.play();
    } catch(e) {}
  });

  /* ── Target lost ── */
  // 1200ms grace period absorbs brief occlusions and fast camera moves
  target.addEventListener("targetLost", () => {
    lostTimer = setTimeout(() => {
      tracking = false;
      video.pause();
      videoPlane.object3D.visible = false;
    }, 1200);
  });

  /* ── Page visibility ── */
  document.addEventListener("visibilitychange", () => {
    if (document.hidden) {
      video.pause();
    } else if (tracking) {
      video.play().catch(() => {});
    }
  });

  /* ── Initial hidden state ── */
  videoPlane.addEventListener("loaded", () => {
    videoPlane.object3D.visible = false;
  });

})();
</script>

</body>
</html>
