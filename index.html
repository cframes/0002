<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#000000" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>AR Experience</title>

<!-- A-Frame FIRST, then MindAR -->
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html,body{
  width:100%;height:100%;
  overflow:hidden;
  background:#000;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  touch-action:none;
  -webkit-user-select:none;user-select:none;
  -webkit-tap-highlight-color:transparent;
}

body{position:fixed;inset:0;}

/* Prevent white flash on iOS */
a-scene{background:#000;}

/* ── Loading Screen ── */
#loading{
  position:fixed;inset:0;
  background:#000;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;gap:20px;
  z-index:9999;
  color:#fff;
  transition:opacity .5s ease;
}
#loading.hide{opacity:0;pointer-events:none;}

.spinner{
  width:44px;height:44px;
  border:3px solid rgba(255,255,255,.15);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

#loading-text{
  font-size:15px;
  letter-spacing:.8px;
  opacity:.8;
}

/* ── Error Screen ── */
#error{
  position:fixed;inset:0;
  background:#000;
  display:none;flex-direction:column;
  justify-content:center;align-items:center;gap:16px;
  z-index:9999;
  color:#ff6b6b;font-size:15px;
  text-align:center;padding:32px;
  line-height:1.6;
}
#error.show{display:flex;}
#error-retry{
  margin-top:8px;
  padding:10px 24px;
  background:#fff;color:#000;
  border:none;border-radius:20px;
  font-size:14px;font-weight:600;
  cursor:pointer;
}

/* ── Tap Prompt ── */
#tap{
  position:fixed;
  left:50%;
  bottom:calc(env(safe-area-inset-bottom,0px) + 30px);
  transform:translateX(-50%);
  padding:11px 22px;
  background:rgba(0,0,0,.7);
  color:#fff;font-size:14px;
  border-radius:20px;
  z-index:1000;
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  transition:opacity .4s ease;
  white-space:nowrap;
  pointer-events:none;
  border:1px solid rgba(255,255,255,.15);
}
#tap.hide{opacity:0;}

/* ── Scan Hint ── */
#scan-hint{
  position:fixed;
  left:50%;top:50%;
  transform:translate(-50%,-50%);
  display:flex;flex-direction:column;
  align-items:center;gap:12px;
  z-index:500;
  pointer-events:none;
  transition:opacity .4s ease;
}
#scan-hint.hide{opacity:0;}

.scan-frame{
  width:200px;height:200px;
  position:relative;
}
.scan-corner{
  position:absolute;
  width:28px;height:28px;
  border-color:#fff;
  border-style:solid;
  opacity:.7;
}
.scan-corner.tl{top:0;left:0;border-width:3px 0 0 3px;}
.scan-corner.tr{top:0;right:0;border-width:3px 3px 0 0;}
.scan-corner.bl{bottom:0;left:0;border-width:0 0 3px 3px;}
.scan-corner.br{bottom:0;right:0;border-width:0 3px 3px 0;}

.scan-line{
  position:absolute;
  left:4px;right:4px;height:2px;
  background:linear-gradient(90deg,transparent,#fff,transparent);
  animation:scanLine 2s ease-in-out infinite;
  opacity:.6;
}
@keyframes scanLine{
  0%{top:4px;opacity:.6;}
  50%{opacity:.9;}
  100%{top:calc(100% - 6px);opacity:.6;}
}

#scan-hint span{
  color:#fff;font-size:13px;
  letter-spacing:.6px;opacity:.7;
}
</style>
</head>

<body>

<div id="loading">
  <div class="spinner"></div>
  <span id="loading-text">Loading AR…</span>
</div>

<div id="error">
  <span>⚠️ AR load failed.<br>Check your connection and try again.</span>
  <button id="error-retry" onclick="location.reload()">Retry</button>
</div>

<div id="tap" class="hide">🔊 Tap to enable audio</div>

<!-- Scan UI (shown before target is found) -->
<div id="scan-hint" class="hide">
  <div class="scan-frame">
    <div class="scan-corner tl"></div>
    <div class="scan-corner tr"></div>
    <div class="scan-corner bl"></div>
    <div class="scan-corner br"></div>
    <div class="scan-line"></div>
  </div>
  <span>Point camera at image</span>
</div>

<a-scene
  embedded
  vr-mode-ui="enabled:false"
  device-orientation-permission-ui="enabled:false"
  color-space="sRGB"
  renderer="
    alpha:true;
    antialias:false;
    precision:mediump;
    colorManagement:true;
    sortObjects:true;
    physicallyCorrectLights:false;
    logarithmicDepthBuffer:false;
    powerPreference:high-performance;
    maxCanvasWidth:1920;
    maxCanvasHeight:1920;
  "
  mindar-image="
    imageTargetSrc: targets.mind;
    autoStart: true;
    uiLoading: no;
    uiScanning: no;
    uiError: no;
    maxTrack: 1;
    filterMinCF: 0.0015;
    filterBeta: 0.005;
    warmupTolerance: 3;
    missTolerance: 8;
  "
>
  <!-- Preload all assets -->
  <a-assets timeout="45000" id="assets">
    <video
      id="video"
      src="video.mp4"
      preload="metadata"
      crossorigin="anonymous"
      loop
      playsinline
      webkit-playsinline
      x5-playsinline
      x5-video-player-type="h5"
      muted
    ></video>
  </a-assets>

  <a-camera
    position="0 0 0"
    look-controls="enabled:false"
    wasd-controls="enabled:false"
  ></a-camera>

  <a-entity id="target" mindar-image-target="targetIndex:0">
    <a-video
      id="videoPlane"
      src="#video"
      position="0 0 0.001"
      width="1"
      height="1.5"
      material="
        shader:flat;
        transparent:true;
        depthTest:false;
        depthWrite:false;
        toneMapped:false;
        side:front;
      "
      visible="false"
    ></a-video>
  </a-entity>

</a-scene>

<script>
(function(){
  'use strict';

  /* ── Element refs ── */
  const scene      = document.querySelector('a-scene');
  const video      = document.getElementById('video');
  const assets     = document.getElementById('assets');
  const target     = document.getElementById('target');
  const videoPlane = document.getElementById('videoPlane');
  const loadingEl  = document.getElementById('loading');
  const errorEl    = document.getElementById('error');
  const tapUI      = document.getElementById('tap');
  const scanHint   = document.getElementById('scan-hint');

  /* ── State ── */
  let tracking      = false;
  let audioUnlocked = false;
  let lostTimer     = null;
  let rafId         = null;
  let rafActive     = false;
  let sceneReady    = false;

  /* ──────────────────────────────────────────────
     iOS / Android video element fixes
  ────────────────────────────────────────────── */
  video.setAttribute('playsinline', '');
  video.setAttribute('webkit-playsinline', '');
  video.muted = true;               // must be muted for autoplay
  video.volume = 1.0;

  /* ──────────────────────────────────────────────
     Loading screen hide
  ────────────────────────────────────────────── */
  function hideLoading() {
    loadingEl.classList.add('hide');
    // Remove from DOM after transition to free memory
    setTimeout(() => { loadingEl.style.display = 'none'; }, 600);
  }

  // MindAR fires 'arReady' when camera + tracker are up
  scene.addEventListener('arReady', () => {
    sceneReady = true;
    hideLoading();
    scanHint.classList.remove('hide');
  });

  // Fallback: hide loading after renderstart if arReady doesn't fire
  scene.addEventListener('renderstart', () => {
    setTimeout(() => {
      if (!sceneReady) {
        hideLoading();
        scanHint.classList.remove('hide');
      }
    }, 1200);
  });

  /* ──────────────────────────────────────────────
     Error handling  
     (Do NOT use fetch HEAD — CORS blocks it on most servers)
  ────────────────────────────────────────────── */
  scene.addEventListener('arError', showError);

  // Catch MindAR console error for missing .mind file
  const _origError = console.error.bind(console);
  console.error = function(...args) {
    const msg = args.join(' ');
    if (msg.includes('targets.mind') || msg.includes('Failed to fetch') || msg.includes('404')) {
      showError();
    }
    _origError(...args);
  };

  function showError() {
    hideLoading();
    scanHint.classList.add('hide');
    errorEl.classList.add('show');
  }

  /* ──────────────────────────────────────────────
     Video dimension auto-fit
  ────────────────────────────────────────────── */
  video.addEventListener('loadedmetadata', () => {
    const w = video.videoWidth  || 1;
    const h = video.videoHeight || 1;
    const ratio = w / h;
    if (ratio >= 1) {
      videoPlane.setAttribute('width',  ratio.toFixed(4));
      videoPlane.setAttribute('height', '1');
    } else {
      videoPlane.setAttribute('width',  '1');
      videoPlane.setAttribute('height', (1 / ratio).toFixed(4));
    }
  });

  /* ──────────────────────────────────────────────
     Video warm-up preload (muted, paused)
     Runs after A-Frame asset system finishes
  ────────────────────────────────────────────── */
  assets.addEventListener('loaded', () => {
    warmUpVideo();
  });

  // Fallback if assets event never fires (some Android browsers)
  setTimeout(warmUpVideo, 3000);
  let warmedUp = false;

  function warmUpVideo() {
    if (warmedUp) return;
    warmedUp = true;
    video.muted = true;
    video.play()
      .then(() => { video.pause(); video.currentTime = 0; })
      .catch(() => {});
  }

  /* ──────────────────────────────────────────────
     Audio unlock
     — Uses both touchstart AND click for max compat
     — Works on iOS Safari, Chrome Android, Samsung
  ────────────────────────────────────────────── */
  function unlockAudio() {
    if (audioUnlocked) return;
    audioUnlocked = true;
    tapUI.classList.add('hide');

    // Create and immediately destroy a silent AudioContext
    // This unlocks the Web Audio API on iOS
    try {
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      if (AudioCtx) {
        const ctx = new AudioCtx();
        const buf = ctx.createBuffer(1, 1, 22050);
        const src = ctx.createBufferSource();
        src.buffer = buf;
        src.connect(ctx.destination);
        src.start(0);
        setTimeout(() => ctx.close(), 500);
      }
    } catch(e){}

    // Unmute and attempt play/pause to unlock video
    video.muted = false;
    video.play()
      .then(() => { video.pause(); video.currentTime = 0; })
      .catch(() => {
        video.muted = true;
        audioUnlocked = false;   // failed — allow retry
        tapUI.classList.remove('hide');
      });
  }

  // Listen on both events (iOS needs touchstart, Android prefers click)
  document.addEventListener('touchstart', unlockAudio, { once: true, passive: true });
  document.addEventListener('click',      unlockAudio, { once: true, passive: true });

  /* ──────────────────────────────────────────────
     Target Found
  ────────────────────────────────────────────── */
  target.addEventListener('targetFound', async () => {
    if (lostTimer) { clearTimeout(lostTimer); lostTimer = null; }
    if (tracking) return;
    tracking = true;

    scanHint.classList.add('hide');
    videoPlane.object3D.visible = true;

    if (!audioUnlocked) tapUI.classList.remove('hide');

    try {
      video.muted = !audioUnlocked;
      video.currentTime = 0;
      await video.play();
    } catch(e) {
      // Fallback: muted play (Android autoplay policy)
      try {
        video.muted = true;
        await video.play();
      } catch(e2) {}
    }

    setRafActive(true);
  });

  /* ──────────────────────────────────────────────
     Target Lost
  ────────────────────────────────────────────── */
  target.addEventListener('targetLost', () => {
    // 1000ms grace — avoids flicker from brief hands / occlusion
    lostTimer = setTimeout(() => {
      tracking = false;
      lostTimer = null;
      video.pause();
      videoPlane.object3D.visible = false;
      tapUI.classList.add('hide');
      scanHint.classList.remove('hide');
      setRafActive(false);
    }, 1000);
  });

  /* ──────────────────────────────────────────────
     Page visibility (tab switch / home button)
  ────────────────────────────────────────────── */
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      video.pause();
      setRafActive(false);
    } else if (tracking) {
      video.play().catch(() => {});
      setRafActive(true);
    }
  });

  /* ──────────────────────────────────────────────
     RAF texture updater
     Only runs while tracking — zero GPU cost otherwise
  ────────────────────────────────────────────── */
  function setRafActive(on) {
    if (on === rafActive) return;
    rafActive = on;
    if (on) {
      rafLoop();
    } else {
      if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    }
  }

  function rafLoop() {
    if (!rafActive) return;
    updateTexture();
    rafId = requestAnimationFrame(rafLoop);
  }

  function updateTexture() {
    if (video.readyState < 2) return;      // HAVE_CURRENT_DATA
    const mesh = videoPlane.getObject3D('mesh');
    if (!mesh) return;
    const mat = mesh.material;
    if (mat && mat.map) {
      mat.map.needsUpdate = true;
    }
  }

  /* ──────────────────────────────────────────────
     Initial visibility — ensure hidden until found
  ────────────────────────────────────────────── */
  videoPlane.addEventListener('loaded', () => {
    videoPlane.object3D.visible = false;
  });

  /* ──────────────────────────────────────────────
     Prevent scroll/zoom on mobile
  ────────────────────────────────────────────── */
  document.addEventListener('gesturestart',  e => e.preventDefault(), { passive: false });
  document.addEventListener('gesturechange', e => e.preventDefault(), { passive: false });
  document.addEventListener('gestureend',    e => e.preventDefault(), { passive: false });

  document.addEventListener('touchmove', e => {
    if (e.touches.length > 1) e.preventDefault();
  }, { passive: false });

})();
</script>

</body>
</html>
