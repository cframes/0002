<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#000000" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>Professional Stable AR</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:100%;height:100%;
  overflow:hidden;
  background:#000;
  font-family:Arial,sans-serif;
  touch-action:none;
  -webkit-user-select:none;user-select:none;
}
body{position:fixed;inset:0;}
canvas{display:block;image-rendering:auto;}

#loading{
  position:fixed;inset:0;background:#000;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;gap:16px;
  z-index:9999;color:#fff;font-size:18px;letter-spacing:.5px;
  transition:opacity .4s ease;
}
#loading.hide{opacity:0;pointer-events:none;}
#loading-spinner{
  width:36px;height:36px;
  border:3px solid rgba(255,255,255,.2);
  border-top-color:#fff;border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

#error{
  position:fixed;inset:0;background:#000;
  display:none;flex-direction:column;
  justify-content:center;align-items:center;gap:12px;
  z-index:9999;color:#ff5555;font-size:16px;
  text-align:center;padding:24px;
}
#error.show{display:flex;}
</style>
</head>
<body>

<div id="loading">
  <div id="loading-spinner"></div>
  <span>Loading AR…</span>
</div>

<div id="error">
  <span>⚠️ Could not load AR.<br>Please refresh and try again.</span>
</div>

<a-scene
  embedded
  vr-mode-ui="enabled:false"
  device-orientation-permission-ui="enabled:false"
  color-space="sRGB"
  renderer="
    alpha:true;
    antialias:false;
    precision:mediump;
    colorManagement:true;
    sortObjects:true;
    physicallyCorrectLights:false;
    logarithmicDepthBuffer:false;
    powerPreference:high-performance;
    maxCanvasWidth:1920;
    maxCanvasHeight:1920;
  "
  mindar-image="
    imageTargetSrc: targets.mind;
    autoStart: true;
    uiLoading: no;
    uiScanning: yes;
    uiError: no;
    maxTrack: 1;
    filterMinCF: 0.1;
    filterBeta: 0.001;
    warmupTolerance: 5;
    missTolerance: 10;
  "
>
  <a-assets timeout="30000" id="assets">
    <video
      id="video"
      src="video.mp4"
      preload="auto"
      crossorigin="anonymous"
      loop
      playsinline
      webkit-playsinline
      muted
    ></video>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled:false"></a-camera>

  <a-entity id="target" mindar-image-target="targetIndex:0">
    <a-video
      id="videoPlane"
      src="#video"
      position="0 0 0"
      width="1"
      height="1.5"
      material="shader:flat;transparent:true;depthTest:false;depthWrite:false;toneMapped:false;npot:true;"
    ></a-video>
  </a-entity>

</a-scene>

<script>
// Wait for full page load before touching anything
window.addEventListener("load", function () {

  var scene      = document.querySelector("a-scene");
  var video      = document.querySelector("#video");
  var assets     = document.querySelector("#assets");
  var target     = document.querySelector("#target");
  var videoPlane = document.querySelector("#videoPlane");
  var loading    = document.querySelector("#loading");
  var errorEl    = document.querySelector("#error");

  var tracking   = false;
  var audioReady = false;
  var lostTimer  = null;
  var rafId      = null;
  var rafRunning = false;

  /* ── Safe show error ─────────────────────────────── */
  function showError() {
    if (loading)  loading.classList.add("hide");
    if (errorEl)  errorEl.classList.add("show");
  }

  /* ── Guard: make sure all elements exist ─────────── */
  if (!scene || !video || !target || !videoPlane) {
    showError();
    return;
  }

  /* ── iOS video attributes ────────────────────────── */
  video.setAttribute("playsinline", "");
  video.setAttribute("webkit-playsinline", "");

  /* ── Pixel ratio cap (inside loaded, fully safe) ─── */
  scene.addEventListener("loaded", function () {
    try {
      if (scene.renderer) {
        scene.renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      }
    } catch (e) {}
  });

  /* ── Error events ────────────────────────────────── */
  scene.addEventListener("arError", showError);

  /* ── Hide loading when render starts ─────────────── */
  scene.addEventListener("renderstart", function () {
    setTimeout(function () {
      if (loading) loading.classList.add("hide");
    }, 400);
  });

  /* ── Auto-fit video aspect ratio ─────────────────── */
  video.addEventListener("loadedmetadata", function () {
    try {
      var w = video.videoWidth;
      var h = video.videoHeight;
      if (!w || !h) return;
      var r = w / h;
      if (r > 1) {
        videoPlane.setAttribute("width",  String(r));
        videoPlane.setAttribute("height", "1");
      } else {
        videoPlane.setAttribute("width",  "1");
        videoPlane.setAttribute("height", String(1 / r));
      }
    } catch (e) {}
  });

  /* ── Buffer video after assets load ──────────────── */
  if (assets) {
    assets.addEventListener("loaded", function () {
      video.muted = true;
      video.play().then(function () {
        video.pause();
        video.currentTime = 0;
      }).catch(function () {});
    });
  }

  /* ── Audio unlock on first gesture ──────────────── */
  document.addEventListener("pointerdown", onFirstGesture, { once: true, passive: true });

  function onFirstGesture() {
    if (audioReady) return;
    video.muted = false;
    video.play().then(function () {
      audioReady = true;
      if (!tracking) {
        video.pause();
        video.currentTime = 0;
      }
    }).catch(function () {
      video.muted = true;
    });
  }

  /* ── Target found ────────────────────────────────── */
  target.addEventListener("targetFound", function () {
    clearTimeout(lostTimer);
    lostTimer = null;
    if (tracking) return;
    tracking = true;

    try { videoPlane.object3D.visible = true; } catch (e) {}
    startRaf();

    video.muted = !audioReady;
    video.currentTime = 0;
    video.play().then(function () {
      video.muted = false;
    }).catch(function () {});
  });

  /* ── Target lost ─────────────────────────────────── */
  target.addEventListener("targetLost", function () {
    lostTimer = setTimeout(function () {
      tracking = false;
      video.pause();
      try { videoPlane.object3D.visible = false; } catch (e) {}
      stopRaf();
    }, 800);
  });

  /* ── Page visibility ─────────────────────────────── */
  document.addEventListener("visibilitychange", function () {
    if (document.hidden) {
      video.pause();
    } else if (tracking) {
      video.play().catch(function () {});
    }
  });

  /* ── RAF — video texture update ──────────────────── */
  function startRaf() {
    if (rafRunning) return;
    rafRunning = true;
    loop();
  }

  function stopRaf() {
    rafRunning = false;
    if (rafId !== null) {
      cancelAnimationFrame(rafId);
      rafId = null;
    }
  }

  function loop() {
    if (!rafRunning) return;
    try {
      if (video.readyState >= 2) {
        var mesh = videoPlane.getObject3D("mesh");
        if (mesh && mesh.material && mesh.material.map) {
          mesh.material.map.needsUpdate = true;
        }
      }
    } catch (e) {}
    rafId = requestAnimationFrame(loop);
  }

  /* ── Hide plane until target found ──────────────── */
  videoPlane.addEventListener("loaded", function () {
    try { videoPlane.object3D.visible = false; } catch (e) {}
  });

  // Fallback: if loaded already fired before we attached listener
  if (videoPlane.hasLoaded) {
    try { videoPlane.object3D.visible = false; } catch (e) {}
  }

});
</script>

</body>
</html>
