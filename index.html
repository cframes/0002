<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#000000" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Stable AR" />
<title>Professional Stable AR</title>

<link rel="dns-prefetch" href="https://aframe.io" />
<link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
<link rel="preconnect" href="https://aframe.io" crossorigin />
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:Arial,Helvetica,sans-serif;
  touch-action:none;
  -webkit-user-select:none;
  user-select:none;
}

body{position:fixed;inset:0;}

#app,
a-scene,
canvas{
  width:100%;
  height:100%;
  display:block;
  background:transparent!important;
}

#sourceVideo{
  position:fixed;
  left:-9999px;
  top:-9999px;
  width:1px;
  height:1px;
  opacity:0;
  pointer-events:none;
}

#loading,
#error,
#startPanel{
  position:fixed;
  inset:0;
  z-index:9999;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:16px;
  padding:24px;
  background:#000;
  color:#fff;
  text-align:center;
}

#loading{
  font-size:18px;
  letter-spacing:.3px;
  transition:opacity .2s ease;
}

#loading.hide{
  opacity:0;
  pointer-events:none;
}

#loading-spinner{
  width:36px;
  height:36px;
  border:3px solid rgba(255,255,255,.22);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin .8s linear infinite;
}

@keyframes spin{to{transform:rotate(360deg);}}

#error,
#startPanel{display:none;}

#error.show,
#startPanel.show{display:flex;}

#error strong,
#startPanel strong{
  color:#ff6b6b;
  font-size:18px;
  line-height:1.3;
